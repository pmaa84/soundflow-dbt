name: 'soundflow'
version: '1.0.0'
config-version: 2

profile: 'soundflow'

model-paths: ["soundflow_dbt/soundflow_dbt/models"]
seed-paths: ["seeds"]
test-paths: ["soundflow_dbt/soundflow_dbt/tests"]
macro-paths: ["soundflow_dbt/soundflow_dbt/macros"]

target-path: "target"
clean-targets: ["target", "dbt_packages"]

models:
  soundflow:
    bronze:
      +schema: bronze
      +materialized: view        # Bronze = vistas sobre las tablas raw
    silver:
      +schema: silver
      +materialized: table       # Silver = tablas limpias persistidas
    gold:
      +schema: gold
      +materialized: table       # Gold = tablas dimensionales persistidas
